name: Build & Deploy Rover SDK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter '!@rover/demo' build
      - run: node packages/sdk/scripts/prepare-deploy.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: rover-sdk-dist
          path: packages/sdk/dist/deploy/

  deploy-vercel:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: rtrvr-ai/rtrvr-cloud-website
          token: ${{ secrets.WEBSITE_PAT }}
      - uses: actions/download-artifact@v4
        with:
          name: rover-sdk-dist
          path: public/
      - name: Update artifact manifest
        run: |
          cat > /tmp/update-manifest.cjs << 'SCRIPT'
          const crypto = require('crypto');
          const fs = require('fs');

          const ARTIFACTS = [
            { name: 'embed.js',          target: 'public/embed.js',          source: '../rover/packages/sdk/dist/embed.js' },
            { name: 'rover.js',          target: 'public/rover.js',          source: '../rover/packages/sdk/dist/rover.js' },
            { name: 'worker/worker.js',  target: 'public/worker/worker.js',  source: '../rover/packages/sdk/dist/worker/rover-worker.js' },
          ];

          const files = {};
          for (const a of ARTIFACTS) {
            const data = fs.readFileSync(a.target);
            files[a.name] = {
              sha256: crypto.createHash('sha256').update(data).digest('hex'),
              bytes: data.length,
              target: a.target,
              source: a.source,
            };
          }

          const sourceCommit = process.env.ROVER_COMMIT || undefined;
          const sourceTag    = process.env.ROVER_TAG    || undefined;

          const manifest = {
            version: 1,
            generatedAt: new Date().toISOString(),
            sourceRoot: '../rover/packages/sdk/dist',
            ...(sourceCommit ? { sourceCommit } : {}),
            ...(sourceTag    ? { sourceTag }    : {}),
            files,
          };

          fs.writeFileSync(
            'public/rover-artifacts-manifest.json',
            JSON.stringify(manifest, null, 2) + '\n',
          );
          console.log('Updated public/rover-artifacts-manifest.json');
          SCRIPT
          node /tmp/update-manifest.cjs
        env:
          ROVER_COMMIT: ${{ github.sha }}
          ROVER_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/embed.js public/rover.js public/worker/ public/rover-artifacts-manifest.json
          git diff --cached --quiet || git commit -m "chore: update Rover SDK artifacts"
          git push

  # npm publishing moved to .github/workflows/release.yml
  # Use manual workflow trigger or push git tags to publish
