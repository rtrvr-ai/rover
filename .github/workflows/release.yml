name: Release & Publish to npm

on:
  # Manual trigger — creates a release PR
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.2, 1.0.0)'
        required: true
        type: string

  # Tag push — builds and publishes to npm
  push:
    tags:
      - 'v*.*.*'

jobs:
  # Step 1: Create a release PR (manual trigger only)
  prepare-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Bump version
        run: node scripts/bump-version.mjs ${{ inputs.version }}

      - name: Create release PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="release/v${{ inputs.version }}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: release v${{ inputs.version }}" \
            --body "$(cat <<'EOF'
          ## Release v${{ inputs.version }}

          Automated version bump across all packages.

          **After merging**, push the tag to trigger npm publish:
          ```bash
          git pull origin main
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}
          ```
          EOF
          )" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ Release PR created for v${{ inputs.version }}"
          echo ""
          echo "Next steps:"
          echo "  1. Review and merge the PR"
          echo "  2. Pull main locally: git pull origin main"
          echo "  3. Push the tag: git tag v${{ inputs.version }} && git push origin v${{ inputs.version }}"
          echo "  4. Tag push will trigger npm publish automatically"

  # Step 2: Build & publish (tag push only)
  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter '!@rover/demo' build

      - name: Publish to npm
        run: cd packages/sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## What's Changed
            Version ${{ steps.version.outputs.version }} of @rtrvr-ai/rover

            ### Install
            ```bash
            npm install @rtrvr-ai/rover@${{ steps.version.outputs.version }}
            ```

            ### CDN
            ```html
            <script src="https://rtrvr.ai/rover.js"></script>
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success notification
        run: |
          echo "✅ Successfully published @rtrvr-ai/rover@${{ steps.version.outputs.version }}"
          echo "📦 NPM: https://www.npmjs.com/package/@rtrvr-ai/rover"
          echo "🎉 GitHub Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
