name: Release & Publish to npm

on:
  # Manual trigger — bumps, builds, publishes, tags, and creates GitHub Release
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.2, 1.0.0)'
        required: true
        type: string

  # Tag push — fallback for local `git tag + push` workflow
  push:
    tags:
      - 'v*.*.*'

jobs:
  # One-shot release: bump → build → publish → tag → GitHub Release
  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Bump version
        run: node scripts/bump-version.mjs ${{ inputs.version }}

      - name: Push release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="release/v${{ inputs.version }}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git push origin "$BRANCH" --force

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter '!@rover/demo' build

      - name: Publish to npm
        run: cd packages/sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          body: |
            ## What's Changed
            Version ${{ inputs.version }} of @rtrvr-ai/rover

            ### Install
            ```bash
            npm install @rtrvr-ai/rover@${{ inputs.version }}
            ```

            ### CDN
            ```html
            <script src="https://rtrvr.ai/rover.js"></script>
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ Successfully published @rtrvr-ai/rover@${{ inputs.version }}"
          echo "📦 NPM: https://www.npmjs.com/package/@rtrvr-ai/rover"
          echo "🎉 GitHub Release: https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version }}"
          echo ""
          echo "📝 (Optional) Sync main — create a PR to update package.json versions:"
          echo "   https://github.com/${{ github.repository }}/compare/main...release/v${{ inputs.version }}?expand=1&title=chore:+sync+v${{ inputs.version }}+to+main"

  # Fallback: Build & publish on tag push (for local `git tag + push` workflow)
  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter '!@rover/demo' build

      - name: Publish to npm
        run: cd packages/sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## What's Changed
            Version ${{ steps.version.outputs.version }} of @rtrvr-ai/rover

            ### Install
            ```bash
            npm install @rtrvr-ai/rover@${{ steps.version.outputs.version }}
            ```

            ### CDN
            ```html
            <script src="https://rtrvr.ai/rover.js"></script>
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success notification
        run: |
          echo "✅ Successfully published @rtrvr-ai/rover@${{ steps.version.outputs.version }}"
          echo "📦 NPM: https://www.npmjs.com/package/@rtrvr-ai/rover"
          echo "🎉 GitHub Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
