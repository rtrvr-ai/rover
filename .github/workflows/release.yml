name: Release & Publish to npm

on:
  # Manual trigger with version input
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.2, 1.0.0)'
        required: true
        type: string

  # Trigger on git tags (e.g., v0.1.2)
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push commits, tags, and create releases
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Determine version from input or tag
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Extract version from tag (v0.1.2 -> 0.1.2)
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      # Bump version in all package.json files (only for manual trigger)
      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        run: |
          node scripts/bump-version.mjs ${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:main --tags

      # Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build all packages
      - name: Build packages
        run: pnpm -r --filter '!@rover/demo' build

      # Publish to npm
      - name: Publish to npm
        run: cd packages/sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## What's Changed
            Version ${{ steps.version.outputs.version }} of @rtrvr-ai/rover

            ### Install
            ```bash
            npm install @rtrvr-ai/rover@${{ steps.version.outputs.version }}
            ```

            ### CDN
            ```html
            <script src="https://rtrvr.ai/rover.js"></script>
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success notification
        run: |
          echo "✅ Successfully published @rtrvr-ai/rover@${{ steps.version.outputs.version }}"
          echo "📦 NPM: https://www.npmjs.com/package/@rtrvr-ai/rover"
          echo "🎉 GitHub Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
